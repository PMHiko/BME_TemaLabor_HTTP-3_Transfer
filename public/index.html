<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebTransport Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1e293b;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
      transition: background .3s;
    }
    #status-dot.connected { background: #22c55e; }
    #status-text { font-size: .75rem; color: #94a3b8; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 160px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar h2 {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #64748b;
      padding: 12px 14px 8px;
    }
    #user-list { list-style: none; overflow-y: auto; flex: 1; }
    #user-list li {
      padding: 6px 14px;
      font-size: .85rem;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #user-list li.me { color: #38bdf8; font-weight: 600; }

    /* ── Chat area ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .msg {
      max-width: 70%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: .875rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .msg.mine {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.other {
      align-self: flex-start;
      background: #1e293b;
      border-bottom-left-radius: 4px;
    }
    .msg .sender { font-size: .7rem; font-weight: 600; margin-bottom: 2px; color: #38bdf8; }
    .msg.mine .sender { color: #bfdbfe; }
    .msg .time { font-size: .65rem; color: #64748b; margin-top: 2px; text-align: right; }
    .msg.mine .time { color: #93c5fd; }

    .system-msg {
      align-self: center;
      font-size: .75rem;
      color: #475569;
      padding: 2px 0;
    }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    #username-input {
      width: 130px;
      flex-shrink: 0;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: .85rem;
      outline: none;
    }
    #username-input:focus { border-color: #2563eb; }
    #msg-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: .875rem;
      outline: none;
    }
    #msg-input:focus { border-color: #2563eb; }

    button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: .875rem;
      cursor: pointer;
      font-weight: 600;
      transition: background .2s;
      flex-shrink: 0;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #334155; cursor: not-allowed; }

    #connect-btn { background: #16a34a; }
    #connect-btn:hover:not(:disabled) { background: #15803d; }
    #connect-btn.disconnect { background: #dc2626; }
    #connect-btn.disconnect:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <header>
    <div id="status-dot"></div>
    <h1>WebTransport Chat</h1>
    <span id="status-text">Nincs kapcsolat</span>
  </header>

  <div class="layout">
    <aside id="sidebar">
      <h2>Online</h2>
      <ul id="user-list"></ul>
    </aside>

    <div class="chat-area">
      <div id="messages"></div>
      <div class="input-area">
        <input id="username-input" type="text" placeholder="Felhasználónév" maxlength="32" autocomplete="off" />
        <button id="connect-btn">Csatlakozás</button>
        <input id="msg-input" type="text" placeholder="Üzenet..." maxlength="500" disabled autocomplete="off" />
        <button id="send-btn" disabled>Küldés</button>
      </div>
    </div>
  </div>

<script>
  const WT_URL = 'https://localhost:4433/chat';

  // ── Állapot ───────────────────────────────────────────────────────────────
  let transport = null;
  let writer    = null;
  let myName    = null;

  const enc = new TextEncoder();
  const dec = new TextDecoder();

  // ── DOM ───────────────────────────────────────────────────────────────────
  const messagesEl    = document.getElementById('messages');
  const userListEl    = document.getElementById('user-list');
  const statusDot     = document.getElementById('status-dot');
  const statusText    = document.getElementById('status-text');
  const usernameInput = document.getElementById('username-input');
  const connectBtn    = document.getElementById('connect-btn');
  const msgInput      = document.getElementById('msg-input');
  const sendBtn       = document.getElementById('send-btn');

  // ── Csatlakozás / lecsatlakozás ───────────────────────────────────────────
  connectBtn.addEventListener('click', () => transport ? disconnect() : connect());

  async function connect() {
    if (!window.WebTransport) {
      addSystem('HIBA: A böngésző nem támogatja a WebTransport API-t.');
      return;
    }

    const username = usernameInput.value.trim();
    if (!username) {
      usernameInput.focus();
      usernameInput.style.borderColor = '#ef4444';
      setTimeout(() => (usernameInput.style.borderColor = ''), 1500);
      return;
    }

    setUI('connecting');

    try {
      transport = new WebTransport(WT_URL);
      await transport.ready;

      const bidi = await transport.createBidirectionalStream();
      writer = bidi.writable.getWriter();

      // Felhasználónév elküldése az első üzenetként
      await send({ type: 'join', text: username });

      readStream(bidi.readable);

      transport.closed
        .then(() => { addSystem('A kapcsolat lezárult.'); cleanup(); })
        .catch(() => { addSystem('A kapcsolat hibával szakadt meg.'); cleanup(); });

    } catch (err) {
      addSystem(`Kapcsolódási hiba: ${err.message}`);
      transport = null;
      setUI('disconnected');
    }
  }

  async function disconnect() {
    transport?.close();
    cleanup();
  }

  // ── Stream olvasás ────────────────────────────────────────────────────────
  async function readStream(readable) {
    const reader = readable.getReader();
    try {
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        handleMessage(JSON.parse(dec.decode(value)));
      }
    } catch {}
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case 'welcome':
        myName = msg.users.find(u =>
          msg.text.includes(u) && !['server'].includes(u)
        ) ?? msg.users.at(-1);
        // A szerver a welcome text-ben adja az üdvözlést, de a nevet a join-ból tudjuk
        // A users listából a saját nevet az utoljára hozzáadott alapján azonosítjuk
        myName = msg.users.at(-1);
        setUI('connected');
        addSystem(msg.text, msg.timestamp);
        setUserList(msg.users);
        break;

      case 'chat':
        addChatMsg(msg.user, msg.text, msg.timestamp, msg.user === myName);
        break;

      case 'join':
        addSystem(msg.text, msg.timestamp);
        addUserToList(msg.user);
        break;

      case 'leave':
        addSystem(msg.text, msg.timestamp);
        removeUserFromList(msg.user);
        break;
    }
  }

  // ── Üzenetküldés ──────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !writer) return;
    msgInput.value = '';
    await send({ type: 'chat', text });
    msgInput.focus();
  }

  async function send(obj) {
    await writer?.write(enc.encode(JSON.stringify(obj)));
  }

  // ── UI segédfüggvények ────────────────────────────────────────────────────
  function setUI(state) {
    if (state === 'connecting') {
      connectBtn.disabled = true;
      connectBtn.textContent = 'Csatlakozás...';
      usernameInput.disabled = true;
    } else if (state === 'connected') {
      connectBtn.disabled = false;
      connectBtn.textContent = 'Kilépés';
      connectBtn.classList.add('disconnect');
      msgInput.disabled = false;
      sendBtn.disabled = false;
      statusDot.classList.add('connected');
      statusText.textContent = `Bejelentkezve: ${myName}`;
      msgInput.focus();
    } else {
      connectBtn.disabled = false;
      connectBtn.textContent = 'Csatlakozás';
      connectBtn.classList.remove('disconnect');
      usernameInput.disabled = false;
      msgInput.disabled = true;
      sendBtn.disabled = true;
      statusDot.classList.remove('connected');
      statusText.textContent = 'Nincs kapcsolat';
    }
  }

  function cleanup() {
    transport = null;
    writer    = null;
    myName    = null;
    userListEl.innerHTML = '';
    setUI('disconnected');
  }

  function addChatMsg(user, text, timestamp, mine) {
    const div = document.createElement('div');
    div.className = `msg ${mine ? 'mine' : 'other'}`;
    div.innerHTML =
      `<div class="sender">${esc(user)}</div>` +
      `<div class="text">${esc(text)}</div>` +
      `<div class="time">${esc(timestamp)}</div>`;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function addSystem(text, timestamp = '') {
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = timestamp ? `${text}  ${timestamp}` : text;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function setUserList(users) {
    userListEl.innerHTML = '';
    users.forEach(addUserToList);
  }

  function addUserToList(username) {
    const existing = [...userListEl.querySelectorAll('li')].find(li => li.dataset.name === username);
    if (existing) return;
    const li = document.createElement('li');
    li.textContent = username;
    li.dataset.name = username;
    if (username === myName) li.className = 'me';
    userListEl.appendChild(li);
  }

  function removeUserFromList(username) {
    userListEl.querySelector(`li[data-name="${CSS.escape(username)}"]`)?.remove();
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
